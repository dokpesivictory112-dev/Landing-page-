<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fers Innova – Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#0b1a2e; --black:#030507; --gold:#d08601; --gold-light:#e89a10;
    --cream:#f8f4ec; --ink:#1b2430; --muted:#6b7a90; --line:#e8e0d0; --radius:12px;
    --danger:#b23b3b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);}
  h1,h2{font-family:'Fraunces',Georgia,serif;margin:0;}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 60px;}
  button,input,select{font-family:inherit;}

  header{background:var(--black);color:var(--cream);padding:16px 18px;text-align:center;margin-bottom:20px;}
  header h1{font-size:18px;color:var(--gold);}

  /* Login gate */
  #login-screen{max-width:340px;margin:80px auto;text-align:center;padding:0 18px;}
  #login-screen h1{font-size:20px;margin-bottom:8px;}
  #login-screen p{color:var(--muted);font-size:13.5px;margin-bottom:20px;}
  #login-screen input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:10px;}
  #login-screen button{width:100%;background:var(--navy);color:var(--gold);border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14.5px;cursor:pointer;}
  #login-error{color:var(--danger);font-size:13px;margin-top:8px;display:none;}

  #app-screen{display:none;}

  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  .card h2{font-size:15.5px;margin-bottom:14px;}
  label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:12px 0 5px;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=number], select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  input[type=file]{width:100%;font-size:13px;}

  .color-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--cream);border-radius:8px;}
  .color-row input[type=text]{flex:1;}
  .color-row input[type=color]{width:36px;height:36px;border:none;padding:0;border-radius:6px;cursor:pointer;flex:none;}
  .color-row .remove-color{background:none;border:none;color:var(--danger);font-weight:700;cursor:pointer;font-size:13px;flex:none;}
  .add-color-btn{background:none;border:1.5px dashed var(--line);color:var(--muted);border-radius:8px;padding:8px;width:100%;font-size:12.5px;font-weight:600;cursor:pointer;margin-top:4px;}

  .size-chip{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--ink);background:#fff;padding:7px 12px;border-radius:8px;border:1.5px solid var(--line);cursor:pointer;user-select:none;}
  .size-chip:has(input:checked){background:var(--gold);border-color:var(--gold);color:var(--black);}
  .size-chip input{margin:0;}

  .photo-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .photo-row input{flex:1;}
  .photo-row .remove-color{background:none;border:none;color:var(--danger);font-weight:700;cursor:pointer;font-size:13px;flex:none;}
  .preview-thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .preview-thumb img{width:100%;height:100%;object-fit:cover;}
  .preview-thumb .main-tag{position:absolute;bottom:0;left:0;right:0;background:var(--gold);color:var(--black);font-size:9px;font-weight:800;text-align:center;padding:1px 0;}
  .preview-thumb .remove-thumb{position:absolute;top:2px;right:2px;background:rgba(3,5,7,0.75);color:#fff;border:none;width:18px;height:18px;border-radius:50%;font-size:11px;line-height:1;cursor:pointer;}

  .save-btn{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14.5px;cursor:pointer;margin-top:16px;}
  .save-btn:disabled{background:#d8d0bd;cursor:not-allowed;}
  .status-msg{font-size:13px;text-align:center;margin-top:10px;}
  .status-msg.ok{color:#1a7a3d;}
  .status-msg.err{color:var(--danger);}

  .product-list-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .product-list-item img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#eee2cc;flex:none;}
  .product-list-info{flex:1;}
  .product-list-name{font-size:13.5px;font-weight:700;}
  .product-list-price{font-size:12.5px;color:var(--gold);font-weight:700;}
  .delete-btn{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;}
  .edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ─────────────────────────────────────────────────────────────
   PASTE YOUR FIREBASE CONFIG HERE — must match catalogue.html exactly
   ───────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyD5R9QsscyhMPYCPAf7J8AplUI242JTR4s",
  authDomain: "fers-christmas-batch.firebaseapp.com",
  projectId: "fers-christmas-batch",
  storageBucket: "fers-christmas-batch.firebasestorage.app",
  messagingSenderId: "814810089242",
  appId: "1:814810089242:web:8bbd11d7f214a9eaf1cea3"
};
/* ────────────────────────────────────────────────────────────── */

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ── Login gate — real Firebase login, not a hardcoded password ── */
document.getElementById("login-btn").addEventListener("click", tryLogin);
document.getElementById("password-input").addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });
document.getElementById("email-input").addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });

async function tryLogin(){
  const email = document.getElementById("email-input").value.trim();
  const pass = document.getElementById("password-input").value;
  document.getElementById("login-error").style.display = "none";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    initApp();
  } catch(err){
    document.getElementById("login-error").style.display = "block";
  }
}


let colorCount = 0;
function addColorRow(){
  const id = colorCount++;
  const row = document.createElement("div");
  row.className = "color-row";
  row.dataset.id = id;
  row.innerHTML = `
    <input type="color" value="#0b1a2e">
    <input type="text" placeholder="Colour name e.g. Navy">
    <input type="file" accept="image/*" class="color-photo-input" style="max-width:110px;font-size:11px;" title="Photo for this colour (optional)">
    <img class="color-photo-preview" style="display:none;width:30px;height:30px;border-radius:6px;object-fit:cover;flex:none;">
    <button type="button" class="remove-color">✕</button>
  `;
  row.dataset.image = "";
  row.querySelector(".remove-color").addEventListener("click", ()=> row.remove());
  row.querySelector(".color-photo-input").addEventListener("change", async (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const preview = row.querySelector(".color-photo-preview");
    try {
      const url = await uploadToCloudinary(file);
      row.dataset.image = url;
      preview.src = url;
      preview.style.display = "block";
    } catch(err){
      console.error(err);
      alert("Photo upload failed, try again.");
    }
  });
  document.getElementById("color-rows").appendChild(row);
}
document.getElementById("add-color-btn").addEventListener("click", addColorRow);


/* ─────────────────────────────────────────────────────────────
   Cloudinary config — for direct photo uploads from this page
   ───────────────────────────────────────────────────────────── */
const CLOUDINARY_CLOUD_NAME = "d4wxsx8d";
const CLOUDINARY_UPLOAD_PRESET = "izgirup2";
/* ────────────────────────────────────────────────────────────── */

let uploadedImages = []; // array of hosted image URLs, in order — first is main photo
let editingId = null; // set when editing an existing product instead of adding new

function loadProductIntoForm(id, p){
  editingId = id;
  document.getElementById("p-name").value = p.name || "";
  document.getElementById("p-price").value = p.price || "";
  document.getElementById("p-category").value = p.category || "Fers Women";

  uploadedImages = p.images && p.images.length ? [...p.images] : (p.image ? [p.image] : []);
  renderPhotoPreview();

  document.getElementById("color-rows").innerHTML = "";
  colorCount = 0;
  (p.colors || []).forEach(c=>{
    addColorRow();
    const row = document.getElementById("color-rows").lastElementChild;
    row.querySelector('input[type=color]').value = c.hex || "#0b1a2e";
    const cnameInput = row.querySelector('input[type=text]');
    cnameInput.value = c.name || "";
    if (c.image){
      row.dataset.image = c.image;
      const preview = row.querySelector(".color-photo-preview");
      preview.src = c.image;
      preview.style.display = "block";
    }
  });

  const sizes = p.sizes || [];
  document.querySelectorAll("#clothing-sizes input, #kids-sizes input, #kidsage-sizes input, #shoe-sizes input").forEach(c=>c.checked=false);
  if (sizes.length){
    const clothingVals = ["XS","S","M","L","XL","XXL","XXXL","XXXXL"];
    const isKidsCm = sizes.some(s=>s.endsWith("cm"));
    const isKidsAge = sizes.some(s=>/[MY]$/.test(s));
    const isClothing = sizes.some(s=>clothingVals.includes(s));
    const sizeType = isKidsCm ? "kids" : isKidsAge ? "kidsage" : (isClothing ? "clothing" : "shoe");
    document.getElementById("size-type").value = sizeType;
    document.getElementById("clothing-sizes").style.display = sizeType==="clothing" ? "flex" : "none";
    document.getElementById("kids-sizes").style.display = sizeType==="kids" ? "flex" : "none";
    document.getElementById("kidsage-sizes").style.display = sizeType==="kidsage" ? "flex" : "none";
    document.getElementById("shoe-sizes").style.display = sizeType==="shoe" ? "flex" : "none";
    const containerMap = {clothing:"clothing-sizes", kids:"kids-sizes", kidsage:"kidsage-sizes", shoe:"shoe-sizes"};
    const containerId = containerMap[sizeType];
    sizes.forEach(val=>{
      const cb = document.querySelector(`#${containerId} input[value="${val}"]`);
      if (cb) cb.checked = true;
    });
  } else {
    document.getElementById("size-type").value = "none";
    document.getElementById("clothing-sizes").style.display = "none";
    document.getElementById("kids-sizes").style.display = "none";
    document.getElementById("kidsage-sizes").style.display = "none";
    document.getElementById("shoe-sizes").style.display = "none";
  }

  document.getElementById("save-btn").textContent = "Update product";
  document.getElementById("cancel-edit-btn").style.display = "block";
  setStatus(`Editing "${p.name}" — make your changes and tap Update.`, true);
  window.scrollTo({top:0, behavior:"smooth"});
}

function resetForm(){
  editingId = null;
  document.getElementById("p-name").value = "";
  document.getElementById("p-price").value = "";
  document.getElementById("p-category").value = "Fers Women";
  uploadedImages = [];
  renderPhotoPreview();
  document.getElementById("upload-status").textContent = "";
  document.getElementById("color-rows").innerHTML = "";
  document.getElementById("size-type").value = "none";
  document.getElementById("clothing-sizes").style.display = "none";
  document.getElementById("kids-sizes").style.display = "none";
  document.getElementById("kidsage-sizes").style.display = "none";
  document.getElementById("shoe-sizes").style.display = "none";
  document.querySelectorAll("#clothing-sizes input, #kids-sizes input, #kidsage-sizes input, #shoe-sizes input").forEach(c=>c.checked=false);
  document.getElementById("save-btn").textContent = "Save product";
  document.getElementById("cancel-edit-btn").style.display = "none";
}

async function uploadToCloudinary(file){
  const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(url, { method: "POST", body: formData });
  if (!res.ok) throw new Error("Upload failed");
  const data = await res.json();
  return data.secure_url;
}

function renderPhotoPreview(){
  const wrap = document.getElementById("photo-preview");
  wrap.innerHTML = uploadedImages.map((url,i)=>`
    <div class="preview-thumb" data-index="${i}">
      <img src="${url}" alt="Product photo ${i+1}">
      ${i===0 ? '<div class="main-tag">MAIN</div>' : ''}
      <button type="button" class="remove-thumb" data-index="${i}">✕</button>
    </div>
  `).join("");
  wrap.querySelectorAll(".remove-thumb").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      uploadedImages.splice(parseInt(btn.dataset.index),1);
      renderPhotoPreview();
    });
  });
}

document.getElementById("p-photos").addEventListener("change", async (e)=>{
  const files = [...e.target.files];
  if (files.length === 0) return;
  const statusEl = document.getElementById("upload-status");
  statusEl.textContent = `Uploading ${files.length} photo(s)…`;
  try {
    for (const file of files){
      const url = await uploadToCloudinary(file);
      uploadedImages.push(url);
      renderPhotoPreview();
    }
    statusEl.textContent = "All photos uploaded.";
  } catch(err){
    console.error(err);
    statusEl.textContent = "Some photos failed to upload — check your connection and try again.";
  }
  e.target.value = "";
});

document.getElementById("size-type").addEventListener("change", (e)=>{
  document.getElementById("clothing-sizes").style.display = e.target.value === "clothing" ? "flex" : "none";
  document.getElementById("kids-sizes").style.display = e.target.value === "kids" ? "flex" : "none";
  document.getElementById("kidsage-sizes").style.display = e.target.value === "kidsage" ? "flex" : "none";
  document.getElementById("shoe-sizes").style.display = e.target.value === "shoe" ? "flex" : "none";
});

function setStatus(msg, ok){
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.className = "status-msg " + (ok ? "ok" : "err");
}

document.getElementById("cancel-edit-btn").addEventListener("click", resetForm);

document.getElementById("save-btn").addEventListener("click", async ()=>{
  const name = document.getElementById("p-name").value.trim();
  const price = parseFloat(document.getElementById("p-price").value);
  const category = document.getElementById("p-category").value.trim();

  if (!name || !price || uploadedImages.length === 0){
    setStatus("Please fill in the name, price, and at least one photo.", false);
    return;
  }

  const saveBtn = document.getElementById("save-btn");
  saveBtn.disabled = true;
  setStatus("Saving…", true);

  try {
    const colors = [];
    for (const row of document.querySelectorAll(".color-row")){
      const hex = row.querySelector('input[type=color]').value;
      const cname = row.querySelector('input[type=text]').value.trim();
      if (!cname) continue;
      colors.push({ name: cname, hex, image: row.dataset.image || uploadedImages[0] });
    }

    const images = [...uploadedImages];
    const mainImageUrl = images[0];

    const sizeType = document.getElementById("size-type").value;
    let sizes = [];
    if (sizeType === "clothing"){
      sizes = [...document.querySelectorAll("#clothing-sizes input:checked")].map(c=>c.value);
    } else if (sizeType === "kids"){
      sizes = [...document.querySelectorAll("#kids-sizes input:checked")].map(c=>c.value);
    } else if (sizeType === "kidsage"){
      sizes = [...document.querySelectorAll("#kidsage-sizes input:checked")].map(c=>c.value);
    } else if (sizeType === "shoe"){
      sizes = [...document.querySelectorAll("#shoe-sizes input:checked")].map(c=>c.value);
    }

    if (editingId){
      await updateDoc(doc(db,"products",editingId), {
        name, price, category, image: mainImageUrl, images, colors, sizes
      });
      setStatus("Product updated!", true);
    } else {
      await addDoc(collection(db,"products"), {
        name, price, category, image: mainImageUrl, images, colors, sizes,
        createdAt: serverTimestamp()
      });
      setStatus("Product saved! It's live on the site now.", true);
    }

    resetForm();
  } catch(err){
    console.error(err);
    setStatus("Something went wrong: " + err.message, false);
  } finally {
    saveBtn.disabled = false;
  }
});

function fmt(n){ return "₦" + Number(n).toLocaleString("en-NG"); }

function initApp(){
  const q = query(collection(db,"products"), orderBy("createdAt","desc"));
  onSnapshot(q, (snap)=>{
    const list = document.getElementById("product-list");
    if (snap.empty){
      list.innerHTML = `<p style="color:var(--muted);font-size:13px;">No products yet — add your first one above.</p>`;
      return;
    }
    list.innerHTML = "";
    snap.forEach(d=>{
      const p = d.data();
      const row = document.createElement("div");
      row.className = "product-list-item";
      row.innerHTML = `
        <img src="${p.image}" alt="${p.name}">
        <div class="product-list-info">
          <div class="product-list-name">${p.name}</div>
          <div class="product-list-price">${fmt(p.price)}${p.category ? ` · ${p.category}` : ""}</div>
        </div>
        <button class="edit-btn" data-id="${d.id}">Edit</button>
        <button class="delete-btn" data-id="${d.id}">Delete</button>
      `;
      row.querySelector(".edit-btn").addEventListener("click", ()=> loadProductIntoForm(d.id, p));
      row.querySelector(".delete-btn").addEventListener("click", async ()=>{
        if (confirm(`Delete "${p.name}"? This can't be undone.`)){
          await deleteDoc(doc(db,"products",d.id));
        }
      });
      list.appendChild(row);
    });
  });
}
</script>
